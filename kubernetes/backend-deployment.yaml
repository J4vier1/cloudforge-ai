apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-migration-assistant
  namespace: cloudforge-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-migration-assistant
  template:
    metadata:
      labels:
        app: cloud-migration-assistant
    spec:
      containers:
        - name: api
          image: cloudforge-ai/cloud-migration-assistant:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
